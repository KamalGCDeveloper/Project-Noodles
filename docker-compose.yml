version: '3.8'

services:
  # Noodle API Service
  noodle-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noodle-api
    ports:
      - "5130:5130"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Override these with your actual MongoDB connection details
      # Or create a .env file with these values
      - DatabaseSettings__ConnectionString=${MONGO_CONNECTION_STRING:-mongodb://data_warehouse_user:3r7od24m5Wx426edHghpB0gNB@207.148.122.148:27017/?authSource=BitCountry-Warehouse}
      - DatabaseSettings__DatabaseName=${MONGO_DATABASE_NAME:-BitCountry-Warehouse}
      - Cors__AllowedOrigins__0=${CORS_ORIGIN_1:-http://localhost:3000}
      - Cors__AllowedOrigins__1=${CORS_ORIGIN_2:-http://localhost:3001}
    restart: unless-stopped
    networks:
      - noodle-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5130/noodle/top-growth-stablecoins"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  noodle-network:
    driver: bridge

